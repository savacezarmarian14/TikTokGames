gateway:
  name: "tiktok-event-gateway"
  environment: "local"

connector:
  provider: "mock"
  tiktok:
    live_username: ""
    reconnect_enabled: true
    reconnect_delay_seconds: 5.0
    include_raw_event_debug: false
    enabled_event_types:
      - "comment"
      - "join"
      - "gift"
      - "like"
      - "follow"
      - "connect"
      - "disconnect"
      - "error"
  mock:
    interval_seconds: 1.0
    enabled_event_types:
      - "comment"
      - "join"
      - "gift"
      - "like"
      - "follow"
    username: "mock_viewer"
    display_name: "Mock Viewer"
    user_id: "mock-user-001"
    room_id: "mock-room"
    stream_id: "mock-stream"

websocket:
  host: "127.0.0.1"
  port: 8765
  path: "/events"
  heartbeat_interval_seconds: 15.0
  client_queue_size: 100

queues:
  raw_event_max_size: 1000
  normalized_event_max_size: 1000

logging:
  level: "INFO"
  json: true
  event_log:
    enabled: false
    path: "logs/events.jsonl"
    include_raw_event: false

replay:
  speed_multiplier: 1.0
